    <title>ガラス価格表 + フロート相談室</title>
    <meta http-equiv="refresh" content="0; url=estimate_app.html">

    <style>
      * { box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: auto;
        background: #f5f4f0;
        font-family: "Noto Sans JP", "Yu Gothic UI", system-ui, sans-serif;
      }
      .estimate-frame {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }
      .chat-launcher {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 20;
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 52px;
        border: 0;
        border-radius: 999px;
        background: #7c3d58;
        color: #fff;
        padding: 8px 16px 8px 10px;
        box-shadow: 0 12px 32px rgba(26, 26, 46, .28);
        font-weight: 700;
        cursor: pointer;
      }
      .chat-launcher img {
        width: 38px;
        height: 38px;
        object-fit: contain;
      }
      .chat-launcher.hidden {
        display: none;
      }
      .chat-panel {
        position: fixed;
        right: 16px;
        bottom: 84px;
        z-index: 30;
        width: min(420px, calc(100vw - 32px));
        height: min(680px, calc(100dvh - 108px));
        overflow: hidden;
        border: 1px solid rgba(26, 26, 46, .16);
        border-radius: 10px;
        background: #fff;
        box-shadow: 0 20px 60px rgba(26, 26, 46, .30);
        transform: translateY(12px);
        opacity: 0;
        pointer-events: none;
        transition: opacity .18s ease, transform .18s ease;
      }
      .chat-panel.open {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }
      .chat-panel iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }
      .chat-close {
        position: absolute;
        top: 8px;
        right: 8px;
        z-index: 2;
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: 8px;
        background: rgba(255, 255, 255, .92);
        color: #2a2226;
        font-size: 22px;
        line-height: 1;
        box-shadow: 0 4px 14px rgba(42, 34, 38, .14);
        cursor: pointer;
      }
      @media (max-width: 720px) {
        .chat-launcher {
          right: 12px;
          bottom: 12px;
          min-height: 48px;
          padding-right: 14px;
        }
        .chat-panel {
          inset: 0;
          width: auto;
          height: auto;
          border-radius: 0;
        }
      }
    </style>

    <section class="chat-panel" id="chatPanel" aria-label="フロート相談室">
      <button class="chat-close" id="chatClose" type="button" aria-label="チャットを閉じる">×</button>
      <iframe title="フロート相談室" src="index_float_chat.html"></iframe>
    </section>

    <script>
      const launcher = document.getElementById("chatLauncher");
      const panel = document.getElementById("chatPanel");
      const close = document.getElementById("chatClose");

      function setOpen(open) {
        panel.classList.toggle("open", open);
        launcher.classList.toggle("hidden", open);
        launcher.setAttribute("aria-expanded", open ? "true" : "false");
      }

      launcher.addEventListener("click", () => {
        setOpen(!panel.classList.contains("open"));
      });

      close.addEventListener("click", () => setOpen(false));

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") setOpen(false);
      });
    </script>
