<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>商品カタログ確認ページ</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #2a2226;
        --muted: #766a70;
        --line: #e7dde1;
        --wine: #9d4566;
        --paper: #fff8fb;
        --panel: rgba(255, 255, 255, 0.93);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: url("assets/background.jpg") center / cover fixed no-repeat;
        color: var(--ink);
        font-family: "Yu Gothic UI", "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif;
        line-height: 1.75;
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .back {
        display: inline-block;
        margin-bottom: 14px;
        color: var(--wine);
        font-weight: 800;
      }

      .sheet {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 48px rgba(80, 55, 68, 0.14);
      }

      header {
        padding: 22px 24px;
        border-bottom: 1px solid var(--line);
        background: var(--paper);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(24px, 6vw, 40px);
        color: var(--wine);
      }

      header p {
        margin-top: 6px;
        color: var(--muted);
      }

      section {
        padding: 22px 24px;
      }

      section + section {
        border-top: 1px solid var(--line);
      }

      h2 {
        margin-bottom: 10px;
        font-size: 18px;
      }

      ul {
        margin: 0;
        padding-left: 1.25em;
      }

      .source {
        color: var(--muted);
      }

      .button {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        margin-top: 14px;
        padding: 0 16px;
        border-radius: 8px;
        background: var(--wine);
        color: #fff;
        font-weight: 800;
        text-decoration: none;
      }

      .catalog-image-wrap {
        display: grid;
        gap: 16px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 10px;
      }

      .catalog-image {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <a class="back" href="index.html">← フロート相談室に戻る</a>
      <article class="sheet">
        <header>
          <h1 id="productName">商品名</h1>
          <p id="productCategory">カテゴリ</p>
        </header>
        <section>
          <h2>どんなガラス？</h2>
          <p id="summary"></p>
        </section>
        <section id="catalogImageSection" hidden>
          <h2>カタログページ画像</h2>
          <div class="catalog-image-wrap" id="catalogImages"></div>
        </section>
        <section>
          <h2>特徴</h2>
          <ul id="features"></ul>
        </section>
        <section>
          <h2>おすすめの場所</h2>
          <ul id="uses"></ul>
        </section>
        <section>
          <h2>性能・注意点</h2>
          <ul id="notes"></ul>
        </section>
        <section>
          <h2>参照</h2>
          <p class="source" id="source"></p>
          <a class="button" id="catalogLink" href="catalog.pdf" target="_blank" rel="noopener">PDFの該当ページを開く</a>
        </section>
      </article>
    </main>

      function renderProduct() {
        const id = location.hash.replace("#", "") || "float-glass";
        const product = productCatalog[id] || productCatalog["float-glass"];
        document.querySelector("#productName").textContent = product.name;
        document.querySelector("#productCategory").textContent = product.category;
        document.querySelector("#summary").textContent = product.summary;
        document.querySelector("#source").textContent = product.source;
        const imageSection = document.querySelector("#catalogImageSection");
        const catalogImages = document.querySelector("#catalogImages");
        const images = product.catalogImages || [];
        if (images.length) {
          catalogImages.replaceChildren(...images.map((src, index) => {
            const img = document.createElement("img");
            img.className = "catalog-image";
            img.src = src;
            img.alt = `${product.name}のカタログページ画像 ${index + 1}`;
            return img;
          }));
          imageSection.hidden = false;
        } else {
          catalogImages.replaceChildren();
          imageSection.hidden = true;
        }
        const catalogLink = document.querySelector("#catalogLink");
        if (images.length) {
          catalogLink.href = images[0];
          catalogLink.textContent = images.length > 1 ? "1枚目のカタログ画像を開く" : "カタログ画像を開く";
          catalogLink.style.display = "inline-flex";
        } else if (product.pdfHref) {
          catalogLink.href = product.pdfHref;
          catalogLink.textContent = "カタログ画像未登録のためPDFを開く";
          catalogLink.style.display = "inline-flex";
        } else {
          catalogLink.removeAttribute("href");
          catalogLink.textContent = "カタログ画像未登録";
          catalogLink.style.display = "inline-flex";
        }
        renderList("#features", product.features);
        renderList("#uses", product.uses);
        renderList("#notes", product.notes);
      }

      function renderList(selector, items) {
        const list = document.querySelector(selector);
        list.replaceChildren(...items.map((item) => {
          const li = document.createElement("li");
          li.textContent = item;
          return li;
        }));
      }

      window.addEventListener("hashchange", renderProduct);
      renderProduct();
    </script>
  </body>
</html>
