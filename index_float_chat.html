<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>フロート相談室</title>
    <link rel="stylesheet" href="styles.css?v=20260603-product-links" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="チャンネル">
        <div class="float-card">
          <img src="float-icon.png" alt="フロート" />
          <div>
            <p>フロート</p>
            <span>社内案内役</span>
          </div>
        </div>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <img class="chat-title-image" src="float-title.png" alt="フロートの相談室 ガラスについてフロートに聞いてみよう！" />
        </header>

        <div class="quick-actions mobile-quick-actions" aria-label="クイック質問">
          <button type="button" data-question="断熱向け商品について教えて">断熱向け商品について聞く</button>
          <button type="button" data-question="防犯向け商品について教えて">防犯向け商品について聞く</button>
          <button type="button" data-question="防音向け商品について教えて">防音向け商品について聞く</button>
        </div>

        <section class="messages" aria-label="メッセージ" id="messages" aria-live="polite"></section>

        <form class="composer">
          <button type="button" title="添付">＋</button>
          <input id="messageInput" aria-label="メッセージ入力" placeholder="フロートに質問する" autocomplete="off" />
          <button class="send" type="submit">送信</button>
        </form>
      </main>

      <aside class="assistant-panel" aria-label="フロート案内">
        <div class="portrait-wrap">
          <img src="float-icon.png" alt="フロート" />
        </div>
        <div class="assistant-copy">
          <p class="assistant-name">フロート</p>
          <h2>俺はガラスブラザーズのリーダー、フロート！</h2>
          <p>ガラスの事で聞きたいことがあったら、なんでも聞いてね♪</p>
        </div>
        <div class="quick-actions">
          <button type="button" data-question="断熱向け商品について教えて">断熱向け商品について聞く</button>
          <button type="button" data-question="防犯向け商品について教えて">防犯向け商品について聞く</button>
          <button type="button" data-question="防音向け商品について教えて">防音向け商品について聞く</button>
        </div>
      </aside>
    </div>
    <script src="products.js"></script>
    <script src="qa.js"></script>
    <script src="script.js?v=20260603-catalog-link-copy"></script>
  </body>
</html>
